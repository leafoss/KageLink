name: kagelink
version: 3.4.1+20
publish_to: "none"
description: Bilingual Android client for KageLink chat, Game controls, and remote Stats.

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.5.0
  web_socket_channel: ^3.0.3
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/kagelink_mark.png
